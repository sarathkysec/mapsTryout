<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAtlas | Modern OSM Experience</title>
    <meta name="description"
        content="A premium, serverless OpenStreetMap experience with modern UI and seamless interactions.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Removed Leaflet CSS CDN -->

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="assets/style.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            corePlugins: {
                preflight: false, // Prevents Tailwind from resetting existing base styles
            }
        }
    </script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="app">
        <!-- Main Map Container -->
        <div id="map"></div>

        <!-- React Root -->
        <div id="root"></div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
